spring.datasource.url=jdbc:h2:mem:hippoject;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.flyway.enabled=false

app.security.jwt.jwk-set-uri=http://localhost/test/jwks
app.notifications.email-enabled=false
app.keycloak.url=http://localhost:8081
app.keycloak.realm=hippoject
app.keycloak.admin.realm=master
app.keycloak.admin.client-id=admin-cli
app.keycloak.admin.username=admin
app.keycloak.admin.password=admin
app.keycloak.frontend-client-id=hippoject-frontend
app.keycloak.frontend-redirect-uri=http://localhost:4200
