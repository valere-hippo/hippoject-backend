name: hippoject-backend-deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run tests
        run: ./mvnw -B test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/hippoject-backend:latest
            ghcr.io/${{ github.repository_owner }}/hippoject-backend:${{ github.sha }}

  deploy:
    needs: build
    runs-on: [self-hosted, Linux, X64, hippoject-prod]

    steps:
      - name: Log in to GHCR for pull
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

      - name: Pull and restart backend
        run: |
          cd "${{ secrets.DEPLOY_PATH }}"
          docker compose --env-file .env.production -f compose.production.yml pull backend
          docker compose --env-file .env.production -f compose.production.yml up -d --no-deps backend
