spring.application.name=hippoject-backend

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/hippoject}
spring.datasource.username=${DATABASE_USERNAME:hippoject}
spring.datasource.password=${DATABASE_PASSWORD:hippoject}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
management.health.mail.enabled=${EMAIL_NOTIFICATIONS_ENABLED:false}

app.security.enabled=${SECURITY_ENABLED:false}
app.security.jwt.jwk-set-uri=${JWT_JWK_SET_URI:http://localhost:8081/realms/hippoject/protocol/openid-connect/certs}

spring.mail.host=${SMTP_SERVER:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${EMAIL:bat.hipposideros@gmail.com}
spring.mail.password=${PASSWORD:tauh ditm unhp rhut}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.notifications.email-enabled=${EMAIL_NOTIFICATIONS_ENABLED:false}
app.notifications.from=${EMAIL:}
